<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>💗 Gacha Candid 💗</title>

<style>
.decor {
    position: fixed;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
    opacity: 0.8;
}

.heart {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #ff8ccf, #ff5fa2);
    clip-path: path("M40 70 C10 40,0 20,20 10 C30 5,40 15,40 20 C40 15,50 5,60 10 C80 20,70 40,40 70 Z");
    top: 20%;
    left: 5%;
}

.star1 {
    width: 60px;
    height: 60px;
    background: gold;
    clip-path: polygon(
      50% 0%, 61% 35%, 98% 35%,
      68% 57%, 79% 91%,
      50% 70%, 21% 91%,
      32% 57%, 2% 35%,
      39% 35%
    );
    top: 65%;
    right: 8%;
}

.star2 {
    width: 40px;
    height: 40px;
    background: #ffd6e8;
    top: 30%;
    right: 15%;
}

@keyframes float {
    0% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-15px) rotate(5deg); }
    100% { transform: translateY(0) rotate(0); }
}

body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #ffd6e8, #fff1b8);
    font-family: "Comic Sans MS", "Segoe UI", sans-serif;
    text-align: center;
}

h1 {
    font-size: 36px;
    letter-spacing: 2px;
    text-shadow:
      0 0 6px #fff,
      0 0 12px #ff8ccf,
      0 0 24px #ffd66b;
}

button {
    padding: 12px 28px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #ff8ccf, #ffd66b);
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.card-wrapper {
    width: 300px;
    height: 570px;
    margin: 20px auto;
    perspective: 1200px;
}
.card-wrapper::before {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 28px;
    background: linear-gradient(
      120deg,
      #ff9ad5,
      #fff0a8,
      #a0f0ff,
      #ff9ad5
    );
    filter: blur(12px);
    opacity: 0.8;
    z-index: -1;
}
.card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1s ease;
    box-shadow:
      0 0 20px rgba(255,180,220,0.8),
      0 0 40px rgba(255,240,180,0.6);
}

.card.flipped {
    transform: rotateY(180deg);
}

.face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    overflow: hidden;
}

.back {
    background: url("card-back.png") center/cover no-repeat;
}

.front {
    transform: rotateY(180deg);
    background: white;
    display: flex;
    flex-direction: column;
background: linear-gradient(180deg, #fff, #ffeaf3);
}

.front img {
    width: 100%;
    height: 80%;
    object-fit: contain;
    background: #ffeaf3;
}

.front h3 {
    margin: 8px;
    color: #ff5fa2;
}

.front p {
    margin: 0 10px;
    font-size: 14px;
}

.shake {
    animation: shake 0.8s ease;
}

@keyframes shake {
    0% { transform: rotateZ(0); }
    20% { transform: rotateZ(2deg); }
    40% { transform: rotateZ(-2deg); }
    60% { transform: rotateZ(1deg); }
    80% { transform: rotateZ(-1deg); }
    100% { transform: rotateZ(0); }
}

.star {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 6px;
    height: 6px;
    background: gold;
    border-radius: 50%;
    pointer-events: none;
    animation: fly 1s ease-out forwards;
}

@keyframes fly {
    to {
        transform: translate(var(--x), var(--y)) scale(1.5);
        opacity: 0;
    }
}

.collection {
    max-width: 1000px;
    margin: 40px auto;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
}

.grid img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: contain;
    background: white;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}
/* Y2K BACKGROUND LAYER */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(120deg, rgba(255,180,220,0.35), rgba(255,240,180,0.35)),
      repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.15),
        rgba(255,255,255,0.15) 2px,
        transparent 2px,
        transparent 6px
      );
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("https://i.pinimg.com/1200x/f5/77/09/f577092db23d34d00a4759b9882fe11c.jpg");
    opacity: 0.2;
    z-index: -1;
}
/* HOLOGRAM LAYER */
.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      120deg,
      rgba(255,154,213,0.4),
      rgba(255,240,168,0.4),
      rgba(160,240,255,0.4),
      rgba(255,154,213,0.4)
    );
    mix-blend-mode: screen;
    opacity: 0.2;
    pointer-events: none;
    transition: background-position 0.1s;
    background-size: 200% 200%;
}
.sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: radial-gradient(circle, #fff, gold);
    border-radius: 50%;
    pointer-events: none;
    box-shadow:
      0 0 6px gold,
      0 0 12px rgba(255,255,255,0.8);
    animation: sparkleFly 1s ease-out forwards;
}

@keyframes sparkleFly {
    to {
        transform: translate(var(--x), var(--y)) scale(1.8);
        opacity: 0;
    }
}
button {
    font-weight: bold;
    letter-spacing: 1px;
    text-shadow: 0 0 6px rgba(255,255,255,0.8);
}

h1 {
    font-size: 38px;
    letter-spacing: 3px;
    text-shadow:
      0 0 8px #fff,
      0 0 16px #ff8ccf,
      0 0 32px #ffd66b;
}
.grid img {
    background: linear-gradient(180deg, #fff, #ffeaf3);
    border: 2px solid rgba(255,200,230,0.8);
}
</style>

</head>

const bgm = document.getElementById("bgm");
let bgmStarted = false;

function startBGM() {
  if (bgmStarted) return;
  bgm.volume = 0.3; // chỉnh nhỏ hơn sound effect
  bgm.play().catch(() => {});
  bgmStarted = true;
}

let available = [...allCards];
let rolling = false;

function roll() {
  startBGM();
  if (rolling) return;
  if (available.length === 0) {
    alert("🎉 Chúc mừng em ba đã thu thập được mọi kho báu! Anh yêu em nhìu nhắm");
    return;
  }

  rolling = true;
  document.getElementById("rollBtn").disabled = true;

  const card = document.getElementById("card");
  const sound = document.getElementById("sound");

  card.classList.remove("flipped");
  card.classList.add("shake");
  sound.currentTime = 0;
  sound.play();
  stars();

  setTimeout(() => {
    const i = Math.floor(Math.random() * available.length);
    const c = available.splice(i, 1)[0];

    img.src = c.img;
    title.innerText = c.title;
    desc.innerText = c.desc;

    card.classList.remove("shake");
    card.classList.add("flipped");

    const thumb = document.createElement("img");
    thumb.src = c.img;
    grid.appendChild(thumb);

    rolling = false;
    document.getElementById("rollBtn").disabled = false;
  }, 1000);
}

function resetAll() {
  if (!confirm("Reset toàn bộ bộ sưu tập?")) return;

  available = [...allCards];
  grid.innerHTML = "";
  document.getElementById("card").classList.remove("flipped");
}

function stars() {
  for (let i = 0; i < 40; i++) {
    const s = document.createElement("div");
    s.className = "star";
    s.style.setProperty("--x", `${Math.random()*400-200}px`);
    s.style.setProperty("--y", `${Math.random()*400-200}px`);
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }
}
function toggleBGM() {
  if (bgm.paused) bgm.play();
  else bgm.pause();
}

const cardEl = document.getElementById("card");

document.addEventListener("mousemove", e => {
  const x = e.clientX / window.innerWidth * 100;
  const y = e.clientY / window.innerHeight * 100;
  cardEl.style.backgroundPosition = `${x}% ${y}%`;
});
